# render.yaml (en la raíz del backend)
services:
  - type: web
    name: atypicaltick-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_PASSWORD_HASH
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TICKTICK_CLIENT_ID
        sync: false
      - key: TICKTICK_CLIENT_SECRET
        sync: false
      - key: REDIRECT_URI
        sync: false